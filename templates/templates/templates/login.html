<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Clientes</title>
</head>
<body>
    <h1>Clientes Registrados</h1>
    
    <form action="/agregar_cliente" method="POST">
        <h3>Agregar Cliente</h3>
        <input type="text" name="nombre" placeholder="Nombre" required>
        <input type="number" step="0.01" name="deuda" placeholder="Deuda" required>
        <input type="text" name="observaciones" placeholder="Observaciones">
        <button type="submit">Agregar</button>
    </form>

    <h3>Lista de Clientes</h3>
    <table border="1">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Deuda</th>
            <th>Fecha de Inicio</th>
            <th>Observaciones</th>
        </tr>
        {% for cliente in clientes %}
        <tr>
            <td>{{ cliente[0] }}</td>
            <td>{{ cliente[1] }}</td>
            <td>${{ cliente[2] }}</td>
            <td>{{ cliente[3] }}</td>
            <td>{{ cliente[4] }}</td>
        </tr>
        {% endfor %}
    </table>

    <h3>Registrar Cobro</h3>
    <form action="/registrar_cobro" method="POST">
        <input type="number" name="cliente_id" placeholder="ID Cliente" required>
        <input type="number" step="0.01" name="monto" placeholder="Monto" required>
        <input type="text" name="comentario" placeholder="Comentario">
        <button type="submit">Registrar Cobro</button>
    </form>

    <br><a href="/">Cerrar Sesión</a>
</body>
</html>
